<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Report | Civic Resolve</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .track-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; }
        input { width: 90%; padding: 12px; margin: 20px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; text-align: center; }
        button { background-color: #0056b3; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; }
        button:hover { background-color: #004494; }
        .result-card { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 8px; display: none; text-align: left; }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 4px; font-weight: bold; background: #ffc107; color: #000; }
    </style>
</head>
<body>

    <div class="track-box">
        <h2 style="color: #0056b3; margin-top: 0;">Track Your Report</h2>
        <p style="color: #666; font-size: 0.9rem;">Enter your Tracking ID to see live updates.</p>
        
        <input type="text" id="trackingId" placeholder="e.g., REP-12345" required>
        <button onclick="trackReport()">Search</button>

        <div id="resultCard" class="result-card">
            <h3 id="resTitle" style="margin-top: 0;"></h3>
            <p><strong>Location:</strong> <span id="resLocation"></span></p>
            <p><strong>Status:</strong> <span id="resStatus" class="status-badge"></span></p>
        </div>
    </div>

    <script>
        async function trackReport() {
            const id = document.getElementById('trackingId').value.trim();
            if (!id) return alert("Please enter a Tracking ID");

            try {
                const response = await fetch(http://localhost:3000/api/track/${id});
                const data = await response.json();

                if (data.success) {
                    document.getElementById('resultCard').style.display = 'block';
                    document.getElementById('resTitle').innerText = data.report.title;
                    document.getElementById('resLocation').innerText = data.report.location;
                    document.getElementById('resStatus').innerText = data.report.status || "Pending";
                } else {
                    alert(data.message);
                    document.getElementById('resultCard').style.display = 'none';
                }
            } catch (error) {
                alert("Could not connect to server.");
            }
        }
    </script>
</body>
</html>
